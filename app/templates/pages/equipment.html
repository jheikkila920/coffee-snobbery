{% extends "base.html" %}
{% block page_title %}Equipment{% endblock %}
{% block content %}
  <main class="mx-auto max-w-5xl px-6 py-12">
    <header class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-semibold">Equipment</h1>
      <button type="button"
              hx-get="/equipment/new"
              hx-target="#equipment-form-mount"
              hx-swap="innerHTML"
              class="rounded bg-espresso-700 px-4 py-2 text-cream-50 hover:bg-espresso-800">
        Add equipment
      </button>
    </header>
    <div id="equipment-form-mount" class="mb-4"></div>
    <div id="equipment-list">
      {% include "fragments/equipment_list.html" %}
    </div>
  </main>
{% endblock %}
