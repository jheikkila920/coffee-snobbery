{% extends "base.html" %}
{% block page_title %}Flavor notes{% endblock %}
{% block content %}
  <main class="mx-auto max-w-5xl px-6 py-12">
    <header class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-semibold">Flavor notes</h1>
      <button type="button"
              hx-get="/flavor-notes/new"
              hx-target="#flavor-note-form-mount"
              hx-swap="innerHTML"
              class="rounded bg-espresso-700 px-4 py-2 text-cream-50 hover:bg-espresso-800">
        Add flavor note
      </button>
    </header>
    <div id="flavor-note-form-mount" class="mb-4"></div>
    <div id="flavor-note-list" class="space-y-3">
      {% include "fragments/flavor_note_list.html" %}
    </div>
  </main>
{% endblock %}
