{% extends "base.html" %}
{% block page_title %}Recipes{% endblock %}
{% block content %}
  <main class="mx-auto max-w-5xl px-6 py-12">
    <header class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-semibold">Recipes</h1>
      <button type="button"
              hx-get="/recipes/new"
              hx-target="#recipe-form-mount"
              hx-swap="innerHTML"
              class="rounded bg-espresso-700 px-4 py-2 text-cream-50 hover:bg-espresso-800">
        Add recipe
      </button>
    </header>
    <div id="recipe-form-mount" class="mb-4"></div>
    <div id="recipe-list" class="space-y-3">
      {% include "fragments/recipe_list.html" %}
    </div>
  </main>
{% endblock %}
