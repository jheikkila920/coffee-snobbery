{% if files %}
  <div class="space-y-2">
    {% for f in files %}
      <div class="flex items-center justify-between rounded-lg border border-espresso-200 bg-cream-100 px-4 py-3 dark:bg-espresso-900 dark:border-espresso-800">
        <div>
          <span class="font-mono text-sm text-espresso-900 dark:text-cream-100">{{ f.filename }}</span>
          <span class="ml-3 text-xs text-espresso-500 dark:text-espresso-400">{{ f.size_human }}</span>
          <span class="ml-3 text-xs text-espresso-400 dark:text-espresso-500">{{ f.mtime_iso }}</span>
        </div>
        <a href="/admin/backups/{{ f.filename }}"
           class="rounded border border-espresso-300 px-3 py-1 text-xs font-semibold text-espresso-700 hover:bg-espresso-100 dark:border-espresso-700 dark:text-cream-200 dark:hover:bg-espresso-800">
          Download
        </a>
      </div>
    {% endfor %}
  </div>
{% else %}
  <p class="text-sm text-espresso-500 dark:text-espresso-400">
    No backups found. Run a backup to create the first file.
  </p>
{% endif %}
