; Alembic configuration for Snobbery.
;
; The runtime database URL is provided by ``app/migrations/env.py`` via
; ``config.set_main_option("sqlalchemy.url", settings.DATABASE_URL)`` —
; do NOT put real connection strings here. ``sqlalchemy.url`` is intentionally
; left empty below so that a missing env.py wiring fails loud rather than
; silently connecting to "" or a stale default.
;
; Logging is intentionally NOT configured here: structlog (Plan 02 in
; app/logging.py) owns the project's logging story. Alembic's stdlib
; logging inherits from logging.basicConfig at the import boundary.

[alembic]
script_location = app/migrations
sqlalchemy.url =
prepend_sys_path = .
version_path_separator = os
truncate_slug_length = 40
